# Production: docker compose -f docker-compose.prod.yml up -d --build
# Requires .env with POSTGRES_PASSWORD, JWT_SECRET, STEAM_*, FRONTEND_URL, etc.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: vorn_games
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vorn_games']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vorn_games
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
