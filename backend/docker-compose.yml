services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vorn_games
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vorn_games']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vorn_games
      STEAM_REALM: http://localhost:3000
      STEAM_RETURN_URL: http://localhost:3000/api/auth/steam/callback
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
